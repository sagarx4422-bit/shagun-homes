<style>
    :root {
        /* Colors */
        --bg-primary: #FFFFFF;
        --bg-secondary: #F7F8F5;
        --bg-card: #FFFFFF;
        --brand-green: #2A5F3F;
        --brand-green-hover: #1B4332;
        --brand-light: #EAF2EC;
        --text-heading: #0F1F13;
        --text-body: #4A5568;
        --text-muted: #9AA5B4;
        --border-color: #E8EDE9;
        --overlay-dark: rgba(15, 31, 19, 0.55);

        /* Shadows */
        --shadow-card: 0 2px 16px rgba(0, 0, 0, 0.06);
        --shadow-hover: 0 8px 40px rgba(42, 95, 63, 0.12);
        --shadow-btn: 0 4px 20px rgba(42, 95, 63, 0.25);
        --shadow-nav: 0 1px 0 #E8EDE9;

        /* Typography */
        --font-serif: 'DM Serif Display', serif;
        --font-sans: 'DM Sans', sans-serif;

        /* Spacing & Radius */
        --container-pad: 40px;
        --radius-card: 16px;
        --radius-btn: 8px;
        --radius-img: 16px;
        --radius-pill: 100px;
    }

    /* Base Reset */
    *,
    *::before,
    *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        font-family: var(--font-sans);
        color: var(--text-body);
        background: var(--bg-primary);
        font-size: 16px;
        line-height: 1.75;
        font-weight: 400;
        overflow-x: hidden;
    }

    /* Typography Hierarchy */
    h1 {
        font-family: var(--font-serif);
        font-weight: 400;
        font-size: clamp(44px, 6vw, 80px);
        line-height: 1.05;
        color: var(--text-heading);
        margin-bottom: 24px;
    }

    h2 {
        font-family: var(--font-serif);
        font-weight: 400;
        font-size: clamp(32px, 4vw, 52px);
        line-height: 1.15;
        color: var(--text-heading);
        margin-bottom: 20px;
    }

    h3 {
        font-family: var(--font-sans);
        font-weight: 500;
        font-size: 22px;
        color: var(--text-heading);
        margin-bottom: 12px;
    }

    a {
        text-decoration: none;
        color: inherit;
        outline: none;
        transition: 0.25s ease;
    }

    ul {
        list-style: none;
    }

    img {
        max-width: 100%;
        display: block;
        border-radius: var(--radius-img);
        object-fit: cover;
    }

    button,
    input,
    select,
    textarea {
        font-family: inherit;
    }

    /* Layout Utilities */
    .container {
        width: 100%;
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 var(--container-pad);
    }

    .section {
        padding: 100px 0;
    }

    .bg-secondary {
        background: var(--bg-secondary);
    }

    .bg-dark {
        background: #0F1F13;
        color: white;
    }

    /* Components: Labels, Pills, Buttons */
    .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--brand-light);
        color: var(--brand-green);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 8px 16px;
        border-radius: var(--radius-pill);
    }

    .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: var(--brand-green);
        color: white;
        padding: 12px 24px;
        border-radius: var(--radius-btn);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1px;
        border: none;
        cursor: pointer;
        transition: all 0.25s ease;
    }

    .btn-primary:hover {
        background: var(--brand-green-hover);
        box-shadow: var(--shadow-btn);
        transform: translateY(-2px);
    }

    .btn-outline {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: transparent;
        color: var(--text-heading);
        padding: 12px 24px;
        border-radius: var(--radius-btn);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1px;
        border: 1px solid var(--border-color);
        cursor: pointer;
        transition: all 0.25s ease;
    }

    .btn-outline:hover {
        border-color: var(--text-heading);
        transform: translateY(-2px);
    }

    .btn-ghost {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: transparent;
        color: var(--brand-green);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: none;
    }

    .btn-ghost:hover {
        opacity: 0.8;
    }

    /* Forms */
    label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 8px;
        letter-spacing: 1px;
    }

    input,
    select,
    textarea {
        width: 100%;
        padding: 14px 16px;
        border-radius: var(--radius-btn);
        border: 1px solid var(--border-color);
        font-size: 15px;
        color: var(--text-heading);
        background: white;
        transition: all 0.25s ease;
        outline: none;
        -webkit-appearance: none;
        appearance: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
        border-color: var(--brand-green);
        box-shadow: 0 0 0 3px rgba(42, 95, 63, 0.08);
    }

    textarea {
        resize: vertical;
        min-height: 100px;
    }

    select {
        background-image: url('data:image/svg+xml;utf8,<svg fill="none" stroke="%239AA5B4" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M6 9l6 6 6-6"></path></svg>');
        background-repeat: no-repeat;
        background-position: right 16px center;
        background-size: 16px;
    }

    /* Navigation */
    .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100px;
        background: var(--bg-primary);
        border-bottom: 1px solid var(--border-color);
        z-index: 1000;
        transition: 0.25s ease;
        display: flex;
        align-items: center;
    }

    .navbar.scrolled {
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
    }

    .nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        height: 100%;
    }

    .nav-logo {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .nav-logo img {
        height: 80px;
        max-width: 240px;
        width: auto;
        border-radius: 0;
        object-fit: contain;
    }

    .logo-icon {
        width: 32px;
        height: 32px;
        background: var(--brand-light);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--brand-green);
    }

    .logo-text {
        display: flex;
        flex-direction: column;
    }

    .logo-text span.title {
        font-family: var(--font-serif);
        font-size: 20px;
        color: var(--text-heading);
        line-height: 1;
    }

    .logo-text span.sub {
        font-size: 10px;
        color: var(--text-muted);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-top: 4px;
    }

    .nav-links {
        display: flex;
        gap: 4px;
        align-items: center;
        background: var(--bg-secondary);
        padding: 6px;
        border-radius: 100px;
        border: 1px solid var(--border-color);
        position: relative;
    }

    .nav-links a {
        display: inline-block;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-heading);
        padding: 8px 24px;
        border-radius: 100px;
        transition: color 0.3s ease;
        position: relative;
        z-index: 2;
    }

    .nav-links a:hover,
    .nav-links a.active,
    .nav-links a.has-pill {
        color: var(--text-heading) !important;
        font-weight: 600;
    }

    .nav-pill-bg {
        position: absolute;
        top: 6px;
        bottom: 6px;
        left: 0;
        background: white;
        border-radius: 100px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1;
        opacity: 0;
        pointer-events: none;
    }

    .nav-actions {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .nav-actions .btn-outline {
        padding: 8px 20px;
        font-size: 14px;
    }

    .nav-actions .btn-primary {
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 13px;
    }

    /* Transparent Navbar Overrides (Homepage Hero) */
    .transparent-nav .navbar:not(.scrolled) {
        background: transparent;
        border-bottom: none;
    }

    .transparent-nav .navbar:not(.scrolled) .nav-links {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .transparent-nav .navbar:not(.scrolled) .nav-links a {
        color: rgba(255, 255, 255, 0.95);
    }

    .transparent-nav .navbar:not(.scrolled) .nav-actions .btn-outline {
        color: #ffffff;
        border-color: rgba(255, 255, 255, 0.6);
    }

    .transparent-nav .navbar:not(.scrolled) .nav-actions .btn-outline:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #ffffff;
    }

    .transparent-nav .navbar:not(.scrolled) .nav-pill-bg {
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        box-shadow: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .hamburger {
        display: none;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
    }

    .hamburger svg {
        width: 24px;
        height: 24px;
        stroke: var(--brand-green);
        stroke-width: 2;
    }

    /* Property Cards */
    .prop-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
    }

    .prop-card {
        background: var(--bg-card);
        border-radius: var(--radius-card);
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow-card);
        overflow: hidden;
        transition: 0.3s ease;
        display: flex;
        flex-direction: column;
    }

    .prop-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-hover);
    }

    .prop-img-wrap {
        position: relative;
        height: 220px;
        overflow: hidden;
        border-radius: var(--radius-card) var(--radius-card) 0 0;
    }

    .prop-img-wrap img {
        width: 100%;
        height: 100%;
        border-radius: 0;
        transition: transform 0.5s ease;
    }

    .prop-card:hover .prop-img-wrap img {
        transform: scale(1.04);
    }

    .prop-img-overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 50%;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.4), transparent);
        pointer-events: none;
    }

    .prop-badge-left {
        position: absolute;
        top: 16px;
        left: 16px;
        background: var(--brand-green);
        color: white;
        padding: 4px 12px;
        border-radius: 100px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    .prop-badge-right {
        position: absolute;
        top: 16px;
        right: 16px;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(4px);
        color: var(--brand-green);
        padding: 4px 12px;
        border-radius: 100px;
        font-size: 11px;
        font-weight: 600;
    }

    .prop-body {
        padding: 20px 24px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }

    .prop-loc {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 6px;
    }

    .prop-loc .loc-left {
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .prop-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-heading);
        line-height: 1.3;
        margin-bottom: 4px;
    }

    .prop-type {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 14px;
    }

    .prop-specs {
        display: flex;
        gap: 16px;
        margin-bottom: 16px;
    }

    .prop-spec {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-heading);
    }

    .prop-spec svg {
        width: 14px;
        height: 14px;
        stroke: var(--text-muted);
        fill: none;
    }

    .prop-divider {
        height: 1px;
        background: var(--border-color);
        margin: 0 0 16px 0;
    }

    .prop-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: auto;
    }

    .prop-price {
        font-size: 22px;
        font-weight: 800;
        color: var(--brand-green);
        line-height: 1;
        margin-bottom: 4px;
    }

    .prop-price-sub {
        font-size: 11px;
        color: var(--text-muted);
    }

    .btn-enquire {
        background: var(--brand-light);
        border: 1px solid var(--brand-light);
        color: var(--brand-green);
        padding: 8px 18px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.25s ease;
    }

    .btn-enquire:hover {
        background: var(--brand-green);
        color: white;
    }

    /* Testimonials */
    /* Testimonials Grid */
    .testi-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        margin-top: 32px;
    }

    .testi-card {
        background: white;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        padding: 32px;
        box-shadow: var(--shadow-card);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        position: relative;
    }

    .testi-card:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-hover);
    }

    .testi-quote-mark {
        position: absolute;
        top: 24px;
        right: 24px;
        font-family: var(--font-serif);
        font-size: 60px;
        color: var(--brand-light);
        line-height: 1;
        pointer-events: none;
    }

    .testi-stars {
        color: var(--accent-gold);
        font-size: 14px;
        margin-bottom: 20px;
    }

    .testi-text {
        font-size: 16px;
        font-style: italic;
        color: var(--text-body);
        line-height: 1.6;
        margin-bottom: 32px;
        flex-grow: 1;
    }

    .testi-author {
        display: flex;
        align-items: center;
        gap: 16px;
        border-top: 1px solid var(--border-color);
        padding-top: 20px;
    }

    .testi-avatar {
        width: 48px;
        height: 48px;
        background: var(--brand-light);
        color: var(--brand-green);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
    }

    .testi-name {
        font-weight: 700;
        color: var(--text-heading);
        margin-bottom: 2px;
    }

    .testi-meta {
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
    }

    @media (max-width: 1024px) {
        .testi-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 640px) {
        .testi-grid {
            grid-template-columns: 1fr;
        }
    }

    /* Footer */
    .footer {
        background: #0F1F13;
        color: white;
        padding: 72px 0 32px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .footer-top {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 48px;
        margin-bottom: 48px;
    }

    .footer-top-h2 {
        font-family: var(--font-serif);
        font-size: 40px;
        font-style: italic;
        color: white;
        line-height: 1.2;
        max-width: 480px;
    }

    .footer-addr {
        margin-bottom: 16px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 15px;
    }

    .footer-phone {
        font-size: 32px;
        font-weight: 700;
        color: white;
        display: block;
        margin-bottom: 8px;
    }

    .footer-wa {
        color: var(--success);
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 15px;
    }

    .footer-divider {
        height: 1px;
        background: #1E3328;
        margin-bottom: 48px;
    }

    .footer-bottom {
        display: grid;
        grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr;
        gap: 32px;
    }

    .footer-col-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: rgba(255, 255, 255, 0.4);
        margin-bottom: 20px;
    }

    .footer-links {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .footer-links a {
        color: rgba(255, 255, 255, 0.6);
        font-size: 13px;
        display: inline-block;
    }

    .footer-links a:hover {
        color: white;
        transform: translateX(4px);
    }

    .footer-socials {
        display: flex;
        gap: 12px;
    }

    .social-btn {
        width: 36px;
        height: 36px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        transition: 0.25s ease;
    }

    .social-btn:hover {
        border-color: var(--brand-green);
        background: var(--brand-green);
        transform: scale(1.1);
    }

    .footer-very-bottom {
        margin-top: 60px;
        padding-top: 28px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .footer-very-bottom p {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.4);
    }

    .footer-very-bottom a {
        color: rgba(255, 255, 255, 0.4);
        margin-left: 16px;
    }

    .footer-very-bottom a:hover {
        color: white;
    }

    /* Floating Buttons */
    .floating-stack {
        position: fixed;
        bottom: 28px;
        right: 28px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        z-index: 9999;
    }

    .float-btn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        box-shadow: var(--shadow-btn);
        transition: 0.25s ease;
        position: relative;
    }

    .float-wa {
        background: #25D366;
    }

    .float-wa::before {
        content: '';
        position: absolute;
        inset: -4px;
        border: 2px solid #25D366;
        border-radius: 50%;
        animation: pulse 2s infinite;
    }

    .float-wa:hover {
        transform: scale(1.08);
    }

    .float-call {
        background: var(--brand-green);
    }

    .float-call:hover {
        transform: scale(1.08);
    }

    .wa-tooltip {
        position: absolute;
        right: 100%;
        top: 50%;
        transform: translateY(-50%);
        margin-right: 16px;
        background: white;
        padding: 8px 16px;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-heading);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        opacity: 0;
        pointer-events: none;
        transition: 0.25s ease;
        white-space: nowrap;
    }

    .float-wa:hover .wa-tooltip {
        opacity: 1;
        transform: translateY(-50%) translateX(-4px);
    }

    /* Banner CTA Section */
    .cta-banner {
        padding: 120px 0;
        background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1460317442991-0ec209397118?w=1920&q=80') center/cover;
        position: relative;
        text-align: center;
        color: white;
    }

    .cta-banner::before {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.25);
    }

    .cta-banner-content {
        position: relative;
        z-index: 2;
        max-width: 640px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Animations */
    .reveal {
        opacity: 0;
        transform: translateY(24px);
        transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    }

    .reveal.visible {
        opacity: 1;
        transform: translateY(0);
    }

    @keyframes pulse {
        0% {
            transform: scale(1);
            opacity: 0.6;
        }

        100% {
            transform: scale(1.3);
            opacity: 0;
        }
    }

    /* Mobile Utilities */
    .mobile-menu {
        position: fixed;
        top: 100px;
        bottom: 0;
        left: 0;
        width: 100%;
        background: white;
        border-radius: 0;
        box-shadow: var(--shadow-modal);
        display: none;
        flex-direction: column;
        z-index: 999;
        padding-bottom: 24px;
        overflow-y: auto;
    }

    .mobile-menu.open {
        display: flex;
    }

    .mobile-marquee-dup {
        display: none !important;
    }

    .mobile-menu a {
        font-size: 20px;
        font-weight: 500;
        color: var(--text-heading);
        border-bottom: 1px solid var(--border-color);
        padding: 16px 24px;
    }
