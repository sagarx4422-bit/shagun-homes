<script>
    // Navbar Scroll State
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 40) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });

    // Mobile Menu Toggle
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    let menuOpen = false;
    hamburger.addEventListener('click', () => {
        menuOpen = !menuOpen;
        if (menuOpen) {
            mobileMenu.classList.add('open');
            hamburger.innerHTML = '<svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" stroke="currentColor"/></svg>';
        } else {
            mobileMenu.classList.remove('open');
            hamburger.innerHTML = '<svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" stroke="currentColor"/></svg>';
        }
    });

    // Active Nav Link mapping based on page filename
    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    const navLinksMap = {
        'index.html': 'nav-home',
        'about.html': 'nav-about',
        'properties.html': 'nav-properties',
        'property.html': 'nav-properties',
        'contact.html': 'nav-contact'
    };
    const activeId = navLinksMap[currentPage];

    // Nav sliding pill logic
    const navLinksContainer = document.querySelector('.nav-links');
    const pillBg = document.getElementById('nav-pill-bg');
    const links = document.querySelectorAll('.nav-links a');

    function updatePill(targetEl) {
        if (!targetEl) return;
        const linkRect = targetEl.getBoundingClientRect();
        const containerRect = navLinksContainer.getBoundingClientRect();

        pillBg.style.width = `${linkRect.width}px`;
        pillBg.style.transform = `translateX(${linkRect.left - containerRect.left}px)`;
        pillBg.style.opacity = '1';
    }

    if (activeId) {
        const activeEl = document.getElementById(activeId);
        if (activeEl) {
            activeEl.classList.add('active');
            // Wait for layout to calculate widths properly
            setTimeout(() => {
                updatePill(activeEl);
            }, 100);
        }
    }

    links.forEach(link => {
        link.addEventListener('mouseenter', (e) => updatePill(e.target));
        link.addEventListener('mouseleave', () => {
            const activeEl = document.querySelector('.nav-links a.active');
            if (activeEl) {
                updatePill(activeEl);
            } else {
                pillBg.style.opacity = '0';
            }
        });
    });

    // Scroll Reveal Observer
    const obsOptions = { threshold: 0.05, rootMargin: "0px 0px 0px 0px" };
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                // Stat counter triggered here
                if (entry.target.classList.contains('stat-group')) {
                    animateCounters(entry.target);
                }
                observer.unobserve(entry.target);
            }
        });
    }, obsOptions);

    document.querySelectorAll('.reveal').forEach(el => {
        observer.observe(el);
    });

    // Stat Counters
    function animateCounters(container) {
        const counters = container.querySelectorAll('.stat-num-val');
        counters.forEach(counter => {
            const target = +counter.getAttribute('data-target');
            const duration = 1500; // ms
            const stepTime = 20;
            let current = 0;
            const increment = target / (duration / stepTime);

            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    counter.innerHTML = Math.ceil(target);
                    clearInterval(timer);
                } else {
                    counter.innerHTML = Math.ceil(current);
                }
            }, stepTime);
        });
    }

    // Cookie Bar
    const cookieBar = document.getElementById('cookie-bar');
    if (cookieBar && !localStorage.getItem('shagun_cookie_dismissed')) {
        setTimeout(() => {
            cookieBar.style.transform = 'translateY(0)';
        }, 2000);
    }
    function dismissCookie() {
        if (cookieBar) {
            cookieBar.style.transform = 'translateY(100%)';
            localStorage.setItem('shagun_cookie_dismissed', 'true');
        }
    }

    // Lazy Load Fallbacks
    document.querySelectorAll('img').forEach(img => {
        img.setAttribute('loading', 'lazy');
        img.addEventListener('error', function () {
            this.src = 'data:image/svg+xml;charset=UTF-8,%3Csvg%20width%3D%22600%22%20height%3D%22400%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20fill%3D%22%23F0F4F1%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-family%3D%22sans-serif%22%20font-size%3D%2220%22%20fill%3D%22%239AA5B4%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%3EShagun%20Homes%3C%2Ftext%3E%3C%2Fsvg%3E';
        });
    });

    // Auto-scrolling Mobile Marquees (Swipeable + Infinite loop)
    function initCarousels() {
        document.querySelectorAll('.mobile-marquee-track').forEach(track => {
            // Skip if already initialized
            if (track.dataset.carouselInit) return;
            track.dataset.carouselInit = 'true';

            if (track.children.length === 0) return;

            const origChildren = Array.from(track.children);

            // Record original content width BEFORE cloning
            // Wait for layout, then measure
            requestAnimationFrame(() => {
                // Clone children 3 times for seamless looping
                for (let i = 0; i < 3; i++) {
                    origChildren.forEach(child => {
                        const clone = child.cloneNode(true);
                        clone.removeAttribute('id');
                        clone.dataset.cloned = 'true';
                        track.appendChild(clone);
                    });
                }

                // Measure after cloning. The original set is 1/4 of total (3 extra copies).  
                const loopPoint = track.scrollWidth / 4;

                let isTouching = false;

                track.addEventListener('touchstart', () => { isTouching = true; }, { passive: true });
                track.addEventListener('touchend', () => {
                    setTimeout(() => {
                        isTouching = false;
                    }, 1500);
                });
                track.addEventListener('scroll', () => {
                    // If manually swiped past the loop point, reset
                    if (!isTouching && track.scrollLeft >= track.scrollWidth - track.offsetWidth - 10) {
                        track.scrollLeft = 0;
                    }
                });

                let accumulator = 0;
                const scrollSpeed = 0.7;

                function step() {
                    if (!isTouching) {
                        accumulator += scrollSpeed;
                        if (accumulator >= 1) {
                            track.scrollLeft += Math.floor(accumulator);
                            accumulator -= Math.floor(accumulator);
                        }

                        // Seamlessly loop: when past original content, jump back invisibly
                        if (track.scrollLeft >= loopPoint) {
                            track.scrollLeft -= loopPoint;
                        }
                    }
                    requestAnimationFrame(step);
                }

                setTimeout(() => requestAnimationFrame(step), 500);
            });
        });
    }

    // Run on page load (not DOMContentLoaded, to ensure images/layout is ready)
    if (document.readyState === 'complete') {
        initCarousels();
    } else {
        window.addEventListener('load', initCarousels);
    }
</script>
